name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# ── Secrets required ──────────────────────────────────────────────────────────
# GARMIN_SDK_URL          : HTTPS link to the Linux CIQ SDK zip (get it once
#                           from https://developer.garmin.com/connect-iq/sdk/).
#                           Re-download when you update minApiVersion.
# GARMIN_DEVELOPER_KEY_B64: base64-encoded developer_key.der
#                           Generate once on your machine:
#                             openssl genrsa -out dev_key.pem 4096
#                             openssl pkcs8 -topk8 -inform PEM -outform DER \
#                               -in dev_key.pem -out developer_key.der -nocrypt
#                             base64 -w0 developer_key.der > dev_key.b64
#                           Then add the content of dev_key.b64 as the secret.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Python unit tests (no Garmin SDK needed) ─────────────────────────────
  test:
    name: Parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run frame parser tests
        run: python3 -m pytest tests/ -v

  # ── Garmin Connect IQ compilation ─────────────────────────────────────────
  build-ciq:
    name: Compile DataField (fenix8solar47mm)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.GARMIN_SDK_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # Cache the SDK by version (embed SDK version in cache key via URL hash)
      - name: Cache CIQ SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: connectiq-sdk
          key: ciq-sdk-${{ hashFiles('.github/sdk-version.txt') }}

      - name: Download CIQ SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q -O ciq-sdk.zip "${{ secrets.GARMIN_SDK_URL }}"
          mkdir -p connectiq-sdk
          unzip -q ciq-sdk.zip -d connectiq-sdk
          # Flatten one level if the zip wraps everything in a subdirectory
          INNER=$(ls connectiq-sdk | head -1)
          if [ -d "connectiq-sdk/$INNER/bin" ]; then
            mv connectiq-sdk/"$INNER"/* connectiq-sdk/
            rmdir connectiq-sdk/"$INNER"
          fi
          chmod +x connectiq-sdk/bin/monkeyc

      - name: Write .sdk-version hint (for cache key)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: connectiq-sdk/bin/monkeyc --version > .github/sdk-version.txt || true

      - name: Set up developer key
        run: |
          echo "${{ secrets.GARMIN_DEVELOPER_KEY_B64 }}" | base64 -d > developer_key.der

      - name: Create output directory
        run: mkdir -p build

      - name: Compile – fenix8solar47mm
        run: |
          connectiq-sdk/bin/monkeyc \
            --warn \
            --output build/BafangRideSync_fenix8solar47mm.prg \
            --jungle garmin_datafield/monkey.jungle \
            --private-key developer_key.der \
            --device fenix8solar47mm

      # Optional: compile for Edge 1040 too (popular cycling computer)
      - name: Compile – edge1040
        run: |
          connectiq-sdk/bin/monkeyc \
            --warn \
            --output build/BafangRideSync_edge1040.prg \
            --jungle garmin_datafield/monkey.jungle \
            --private-key developer_key.der \
            --device edge1040

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prg-files
          path: build/*.prg
          retention-days: 14
